name: Create WordPress Plugin Release

on:
  push:
    tags:
      - '*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      plugin_slug:
        description: 'Plugin slug (top-level folder name inside the ZIP)'
        required: false
        default: 'blender-node-diagram'
      plugin_path:
        description: 'Path to the plugin in the repository'
        required: false
        default: 'wp-content/plugins/blender-node-diagram-dev'

jobs:
  build:
    name: Build and Upload Release Asset
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload release assets
    env:
      # Use workflow inputs when provided, otherwise fall back to sensible defaults
      PLUGIN_SLUG: ${{ github.event.inputs.plugin_slug || 'blender-node-diagram' }}
      PLUGIN_PATH: ${{ github.event.inputs.plugin_path || 'wp-content/plugins/blender-node-diagram-dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

      # Explicit plugin configuration so packaged ZIP has the correct folder name
      - name: Configure plugin package variables
        run: |
          # Export the job-level env variables into GITHUB_ENV so shell steps can use them
          echo "PLUGIN_SLUG=${PLUGIN_SLUG}" >> $GITHUB_ENV
          echo "PLUGIN_PATH=${PLUGIN_PATH}" >> $GITHUB_ENV
          echo "Configured PLUGIN_SLUG=${PLUGIN_SLUG} PLUGIN_PATH=${PLUGIN_PATH}"

      - name: Update version in plugin file
        run: |
          set -euo pipefail

          # Extract version from tag (remove "v" prefix if present)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: ${VERSION}"

          # Use '|' as sed delimiter so slashes in VERSION won't break the substitution
          PLUGIN_FILE="${PLUGIN_PATH}/${PLUGIN_SLUG}.php"
          if [ ! -f "$PLUGIN_FILE" ]; then
            echo "ERROR: plugin file not found at $PLUGIN_FILE"
            exit 1
          fi
          sed -i "s|{{VERSION}}|${VERSION}|g" "$PLUGIN_FILE"

          # Show the top of the plugin file for debugging
          echo "--- plugin file head ---"
          sed -n '1,24p' "$PLUGIN_FILE"
          echo "------------------------"

          # Verify both the plugin header and the constant were updated (fixed-string match)
          if ! grep -Fq "Version: ${VERSION}" "$PLUGIN_FILE"; then
            echo "ERROR: plugin header Version was not updated to ${VERSION}"
            exit 1
          fi

      - name: Create plugin zip
        run: |
          PLUGIN_SLUG="${PLUGIN_SLUG}"
          PLUGIN_PATH="${PLUGIN_PATH}"

          # Create temporary directory for the plugin
          mkdir -p /tmp/plugin-build/${PLUGIN_SLUG}

          # Copy only the plugin folder into the package directory
          rsync -av --progress "$PLUGIN_PATH/" /tmp/plugin-build/${PLUGIN_SLUG}/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.circleci' \
            --exclude='.babelrc' \
            --exclude='.deployignore' \
            --exclude='.distignore' \
            --exclude='.editorconfig' \
            --exclude='.eslintignore' \
            --exclude='.eslintrc' \
            --exclude='.gitignore' \
            --exclude='.gitlab-ci.yml' \
            --exclude='.travis.yml' \
            --exclude='.DS_Store' \
            --exclude='.*~' \
            --exclude='Thumbs.db' \
            --exclude='behat.yml' \
            --exclude='bitbucket-pipelines.yml' \
            --exclude='bin' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='dependencies.yml' \
            --exclude='Gruntfile.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='phpunit.xml' \
            --exclude='phpunit.xml.dist' \
            --exclude='multisite.xml' \
            --exclude='multisite.xml.dist' \
            --exclude='.phpcs.xml' \
            --exclude='phpcs.xml' \
            --exclude='.phpcs.xml.dist' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpcs.dist.xml' \
            --exclude='build.xml' \
            --exclude='README.md' \
            --exclude='webpack.config.js' \
            --exclude='wp-cli.local.yml' \
            --exclude='yarn.lock' \
            --exclude='tests' \
            --exclude='node_modules' \
            --exclude='*.sql' \
            --exclude='*.tar.gz' \
            --exclude='*.zip' \
            --exclude='manifest.json' \
            --exclude='vendor' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='AGENTS.md' \
            --exclude='.phpunit.result.cache' \
            --exclude='.nvmrc' \
            --exclude='.claude'

          # Create zip file
          cd /tmp/plugin-build
          zip -r ${PLUGIN_SLUG}.zip ${PLUGIN_SLUG}

          # Move zip to workspace
          mv ${PLUGIN_SLUG}.zip ${GITHUB_WORKSPACE}/

          echo "Created ${PLUGIN_SLUG}.zip"
          ls -lh ${GITHUB_WORKSPACE}/${PLUGIN_SLUG}.zip

      - name: Verify ZIP top-level folder matches plugin slug
        run: |
          set -euo pipefail
          ZIP="${GITHUB_WORKSPACE}/${PLUGIN_SLUG}.zip"
          if [ ! -f "$ZIP" ]; then
            echo "ERROR: zip not found at $ZIP"
            exit 1
          fi

          # Try to get the first entry's top-level folder from the zip
          TOP=""
          if command -v zipinfo >/dev/null 2>&1; then
            TOP=$(zipinfo -1 "$ZIP" | sed -n '1p' | cut -d'/' -f1)
          else
            TOP=$(unzip -l "$ZIP" | awk 'NR>3 {print $4; exit}' | sed 's|/.*||')
          fi

          echo "Top-level entry in zip: $TOP"
          if [ "$TOP" != "${PLUGIN_SLUG}" ]; then
            echo "ERROR: zip top-level folder ($TOP) does not match PLUGIN_SLUG (${PLUGIN_SLUG})."
            echo "You should ensure the zip contains a top-level folder named ${PLUGIN_SLUG}."
            exit 1
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        with:
          # Upload the plugin-named zip we created above (use PLUGIN_SLUG so workflow is reusable)
          files: ${{ env.PLUGIN_SLUG }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
